<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Density Management / Gestion de la densité</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="container">
    <div id="menu">
      <h1 id="menu-title"><span id="menu-icon"></span></h1>
      <div id="lang-row">
        <label for="lang" id="lang-label"></label>
        <select id="lang">
          <option value="fr">Français</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="group">
        <label for="vehicle" id="label-vehicle"></label>
        <input class="slider" id="vehicle" type="range" min="0" max="2" step="0.01" value="1">
        <span id="val-vehicle">1.00</span>
      </div>
      <div class="group">
        <label for="parked" id="label-parked"></label>
        <input class="slider" id="parked" type="range" min="0" max="2" step="0.01" value="1">
        <span id="val-parked">1.00</span>
      </div>
      <div class="group">
        <label for="ped" id="label-peds"></label>
        <input class="slider" id="ped" type="range" min="0" max="2" step="0.01" value="1">
        <span id="val-ped">1.00</span>
      </div>
      <div class="group">
        <label for="scene" id="label-scenario"></label>
        <input class="slider" id="scene" type="range" min="0" max="2" step="0.01" value="1">
        <span id="val-scene">1.00</span>
      </div>
      <div class="group">
        <label for="police" id="label-police"></label>
        <input class="slider" id="police" type="range" min="0" max="2" step="0.01" value="1">
        <span id="val-police">1.00</span>
      </div>
      <div class="button-row">
        <button id="reset" class="btn-glass"></button>
        <button id="save" class="btn-glass"></button>
        <button id="close" class="btn-glass"></button>
      </div>
      <div class="credit" id="ui-credit"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
